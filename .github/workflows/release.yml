name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  publish_verifier:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          # Disable caching in release flows to avoid cache poisoning supply chain attacks
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Publish @tinfoilsh/verifier to npm
        run: npm publish --access public --provenance
        working-directory: packages/verifier

  publish_tinfoil:
    runs-on: ubuntu-latest
    needs: publish_verifier
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          # Disable caching in release flows to avoid cache poisoning supply chain attacks
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Publish tinfoil to npm
        run: npm publish --access public --provenance
        working-directory: packages/tinfoil

  create_release:
    runs-on: ubuntu-latest
    needs: publish_tinfoil
    permissions:
      contents: write
    steps:
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
